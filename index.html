<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1118;--surface:#161922;--surface2:#1c1f2b;--border:#252836;
  --text:#e2e4ea;--text-muted:#7a7f94;--text-faint:#4a4e60;
  --green:#2ecc71;--green-dim:#1a7a42;--red:#e74c3c;--red-dim:#8b2e23;
  --orange:#f39c12;--yellow:#f1c40f;
  --font-body:'Inter','Helvetica Neue',sans-serif;
  --font-mono:'Geist Mono','SF Mono',monospace;
}
html{background:var(--bg);color:var(--text);font-family:var(--font-body);-webkit-font-smoothing:antialiased;-webkit-text-size-adjust:100%}
body{min-height:100dvh;background:var(--bg)}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* Header */
.header{position:sticky;top:0;z-index:50;background:var(--bg);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px)}
.logo-area{display:flex;align-items:center;gap:10px}
.logo-icon{width:32px;height:32px;background:var(--green);border-radius:8px;display:flex;align-items:center;justify-content:center}
.logo-icon svg{width:20px;height:20px}
.logo-title{font-size:13px;font-weight:700;letter-spacing:0.5px}
.logo-sub{font-size:9px;color:var(--text-muted);text-transform:uppercase;letter-spacing:2px}

/* Refresh Button */
.refresh-btn{
  background:var(--green);color:#0f1118;border:none;font-family:var(--font-body);
  font-size:12px;font-weight:700;letter-spacing:1px;padding:8px 16px;border-radius:8px;
  cursor:pointer;display:flex;align-items:center;gap:6px;transition:opacity 0.15s;
  -webkit-tap-highlight-color:transparent;
}
.refresh-btn:active{opacity:0.7}
.refresh-btn.loading{opacity:0.6;pointer-events:none}
.refresh-btn svg{width:16px;height:16px;transition:transform 0.3s}
.refresh-btn.loading svg{animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Last Updated */
.last-updated{font-size:10px;color:var(--text-faint);font-family:var(--font-mono);margin-right:8px;display:none}
@media(min-width:480px){.last-updated{display:inline}}

/* Main */
.main{max-width:1400px;margin:0 auto;padding:12px}

/* Grid */
.top-row{display:grid;grid-template-columns:1fr;gap:12px;margin-bottom:12px}
@media(min-width:768px){.top-row{grid-template-columns:2fr 1fr}}
.bottom-row{display:grid;grid-template-columns:1fr;gap:12px}
@media(min-width:900px){.bottom-row{grid-template-columns:2fr 1fr}}

/* Cards */
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.card-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-muted)}
.card-header .icon{color:var(--green);display:flex}
.badge{font-size:10px;background:var(--surface2);color:var(--text-muted);padding:2px 8px;border-radius:99px;margin-left:auto;font-weight:500}

/* Market Card */
.market-card{padding:16px}
.market-symbol{font-size:11px;color:var(--text-muted);font-weight:600;letter-spacing:1px;display:flex;align-items:center;gap:8px}
.market-symbol .tag{font-size:9px;background:var(--surface2);padding:2px 6px;border-radius:4px}
.market-price{font-size:32px;font-weight:700;font-family:var(--font-mono);margin:4px 0;font-variant-numeric:tabular-nums}
.market-change{font-size:14px;font-weight:600;font-family:var(--font-mono);display:inline-flex;align-items:center;gap:4px}
.market-change.up{color:var(--green)}
.market-change.down{color:var(--red)}
.market-details{display:flex;gap:16px;margin-top:8px;font-size:11px;color:var(--text-muted);font-family:var(--font-mono);font-variant-numeric:tabular-nums}
.market-unavailable{padding:20px 16px;color:var(--text-muted);font-size:13px}

/* NQ Signal */
.signal-card{padding:16px;display:flex;flex-direction:column;align-items:center}
.signal-label{font-size:11px;color:var(--text-muted);font-weight:600;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:6px;align-self:flex-start}
.signal-value{font-size:42px;font-weight:700;font-family:var(--font-mono);line-height:1}
.signal-class{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:2px;margin-top:6px}
.signal-sub{font-size:10px;color:var(--text-faint);margin-top:6px;text-align:center;line-height:1.4}
.signal-factors{display:grid;grid-template-columns:1fr 1fr;gap:4px 12px;margin-top:10px;width:100%;font-size:10px}
.signal-factor{display:flex;justify-content:space-between;color:var(--text-muted)}
.signal-factor .val{font-family:var(--font-mono);font-weight:600}
.signal-factor .val.up{color:var(--green)}
.signal-factor .val.down{color:var(--red)}
.signal-factor .val.flat{color:var(--yellow)}

/* Gauge SVG */
.gauge-wrap{width:100%;max-width:200px;margin:4px 0}

/* Volume Chart */
.vol-card{padding:16px}
.vol-chart{width:100%;height:120px;display:flex;align-items:flex-end;gap:1px}
.vol-bar{flex:1;min-width:2px;border-radius:1px 1px 0 0;transition:height 0.3s}
.vol-labels{display:flex;justify-content:space-between;margin-top:4px;font-size:9px;color:var(--text-faint);font-family:var(--font-mono)}
.vol-stat{display:flex;gap:16px;margin-bottom:8px;font-size:11px;color:var(--text-muted);font-family:var(--font-mono);font-variant-numeric:tabular-nums}
.vol-stat .val{font-weight:700;color:var(--text)}

/* News List */
.news-scroll{max-height:500px;overflow-y:auto}
.news-item{display:block;padding:12px 16px;border-bottom:1px solid var(--border);text-decoration:none;color:inherit;transition:background 0.15s;-webkit-tap-highlight-color:transparent;border-left:3px solid transparent}
.news-item.impact-high{border-left-color:var(--red)}
.news-item.impact-med{border-left-color:var(--orange)}
.news-item.impact-low{border-left-color:var(--green)}
.news-item:active,.news-item:hover{background:var(--surface2)}
.news-item:last-child{border-bottom:none}
.news-headline{font-size:13px;font-weight:600;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.news-summary{font-size:12px;color:var(--text-muted);margin-top:4px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.news-meta{font-size:10px;color:var(--text-faint);margin-top:6px;display:flex;align-items:center;gap:6px;text-transform:uppercase;letter-spacing:0.5px}
.impact-tag{font-size:9px;font-weight:700;letter-spacing:1px;padding:2px 6px;border-radius:3px}
.impact-tag.high{background:rgba(231,76,60,0.15);color:var(--red)}
.impact-tag.med{background:rgba(243,156,18,0.15);color:var(--orange)}
.impact-tag.low{background:rgba(46,204,113,0.15);color:var(--green)}
.news-empty{padding:40px 16px;text-align:center;color:var(--text-muted);font-size:13px}

/* Calendar */
.cal-scroll{max-height:500px;overflow-y:auto}
.cal-item{padding:12px 16px;border-bottom:1px solid var(--border)}
.cal-item:last-child{border-bottom:none}
.cal-event{font-size:13px;font-weight:600;line-height:1.3}
.cal-time{font-size:10px;color:var(--text-muted);margin-top:4px;display:flex;align-items:center;gap:4px}
.cal-impact{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:1px;padding:2px 6px;border-radius:3px;margin-left:6px}
.cal-impact.high{background:rgba(231,76,60,0.15);color:var(--red)}
.cal-impact.medium{background:rgba(241,196,15,0.15);color:var(--yellow)}
.cal-impact.low{background:var(--surface2);color:var(--text-muted)}
.cal-data{display:flex;gap:12px;margin-top:6px;font-size:10px;font-family:var(--font-mono);color:var(--text-muted);font-variant-numeric:tabular-nums}
.cal-data strong{color:var(--text);font-weight:600}
.cal-data .actual{color:var(--green);font-weight:700}

/* Skeleton */
.skeleton{background:linear-gradient(90deg,var(--surface2) 25%,var(--border) 50%,var(--surface2) 75%);background-size:200% 100%;animation:shimmer 1.5s ease-in-out infinite;border-radius:4px}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
.sk-line{height:14px;margin-bottom:8px}
.sk-line.w75{width:75%}.sk-line.w50{width:50%}.sk-line.w100{width:100%}
.sk-big{height:36px;width:40%;margin-bottom:8px}

/* Footer */
.footer{text-align:center;padding:16px;font-size:10px;color:var(--text-faint)}
.footer a{color:var(--text-faint);text-decoration:none}
</style>

<script>
// ========== CORS PROXY — RACE ALL AT ONCE ==========
const PROXIES=[
  u=>'https://api.allorigins.win/raw?url='+encodeURIComponent(u),
  u=>'https://corsproxy.io/?url='+encodeURIComponent(u),
  u=>'https://api.codetabs.com/v1/proxy?quest='+encodeURIComponent(u),
];

// Race all proxies — first good response wins
async function proxyFetch(url,timeout=6000){
  const ctrl=new AbortController();
  const timer=setTimeout(()=>ctrl.abort(),timeout);
  try{
    const r=await Promise.any(PROXIES.map(p=>
      fetch(p(url),{signal:ctrl.signal}).then(r=>{if(!r.ok)throw new Error(r.status);return r})
    ));
    clearTimeout(timer);
    return r;
  }catch(e){clearTimeout(timer);return null}
}

// Retry proxy fetch with delay between attempts
async function proxyFetchRetry(url,retries=2,timeout=6000){
  for(let i=0;i<retries;i++){
    const r=await proxyFetch(url,timeout);
    if(r)return r;
    if(i<retries-1)await new Promise(ok=>setTimeout(ok,500));
  }
  return null;
}

// ========== NEWS ==========
function stripHtml(s){
  return s.replace(/<[^>]*>/g,'').replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"').replace(/&#039;/g,"'").replace(/&apos;/g,"'").replace(/&#x2019;/g,'\u2019').replace(/&#x2014;/g,'\u2014').replace(/&nbsp;/g,' ').replace(/[\u200B-\u200D\u2060\uFEFF]/g,'').trim();
}
function extractCDATA(s){const m=s.match(/<!\[CDATA\[([\s\S]*?)\]\]>/);return m?m[1]:s}
function parseRSS(xml,src){
  const items=[];
  const re=/<item>([\s\S]*?)<\/item>/g;let m;
  while((m=re.exec(xml))!==null){
    const x=m[1];
    const t=x.match(/<title>([\s\S]*?)<\/title>/);
    const l=x.match(/<link>([\s\S]*?)<\/link>/);
    const d=x.match(/<pubDate>([\s\S]*?)<\/pubDate>/);
    const desc=x.match(/<description>([\s\S]*?)<\/description>/);
    if(t&&l){
      items.push({
        title:stripHtml(extractCDATA(t[1].trim())),
        link:extractCDATA(l[1].trim()),
        pubDate:d?d[1].trim():new Date().toUTCString(),
        desc:desc?stripHtml(extractCDATA(desc[1].trim())).slice(0,200):'',
        source:src
      });
    }
  }
  return items;
}

async function fetchRSS(url,src){
  try{
    const r=await proxyFetch(url);
    if(!r)return[];
    return parseRSS(await r.text(),src);
  }catch(e){console.warn('RSS fail:',src,e.message);return[]}
}

const FEEDS=[
  {url:'https://feeds.content.dowjones.io/public/rss/mw_topstories',name:'MarketWatch'},
  {url:'https://feeds.content.dowjones.io/public/rss/mw_marketpulse',name:'MarketWatch'},
  {url:'https://search.cnbc.com/rs/search/combinedcms/view.xml?partnerId=wrss01&id=100003114',name:'CNBC'},
  {url:'https://search.cnbc.com/rs/search/combinedcms/view.xml?partnerId=wrss01&id=15839069',name:'CNBC'},
  {url:'https://www.investing.com/rss/news.rss',name:'Investing.com'},
];

const KW=['nasdaq','nq','futures','tech','fed','fomc','cpi','inflation','rate','jobs','employment','gdp','market','stock','s&p','dow','earnings','apple','microsoft','google','amazon','nvidia','meta','tesla','ai','semiconductor','chip','trade','tariff','treasury','bond','yield','rally','sell','bear','bull','volatility','vix','economy','recession','growth','profit','revenue','ipo','sec','regulation','bank','oil','crypto','bitcoin','etf','index','pre-market','premarket','wall street','investor','trading','stocks','shares','equity','quarter','billion','million','percent','forecast','outlook','risk'];

async function loadNews(){
  const results=await Promise.allSettled(FEEDS.map(f=>fetchRSS(f.url,f.name)));
  let all=[];
  results.forEach(r=>{if(r.status==='fulfilled')all.push(...r.value)});
  const seen=new Set();
  all=all.sort((a,b)=>new Date(b.pubDate)-new Date(a.pubDate)).filter(i=>{
    const k=i.title.toLowerCase().slice(0,50);
    if(seen.has(k))return false;seen.add(k);return true;
  });
  const filtered=all.filter(i=>{
    const t=(i.title+' '+i.desc).toLowerCase();
    return KW.some(k=>t.includes(k));
  });
  return(filtered.length>5?filtered:all).slice(0,30);
}

function timeAgo(dateStr){
  const diff=Math.floor((Date.now()-new Date(dateStr).getTime())/1000);
  if(diff<60)return 'Just now';
  if(diff<3600){const m=Math.floor(diff/60);return m===1?'1 min ago':m+' min ago'}
  if(diff<86400){const h=Math.floor(diff/3600);return h===1?'1 hr ago':h+' hrs ago'}
  const d=Math.floor(diff/86400);return d===1?'Yesterday':d+' days ago';
}

// ========== NQ SENTIMENT ENGINE ==========
// Bearish (red) — likely to push NQ down hard
const BEAR_HEAVY=['crash','recession','rate hike','hawkish','sell-off','selloff','plunge','tank','collapse','downgrade','default','layoffs','mass layoff','bear market','circuit breaker','margin call','capitulation','black swan','contagion','bank failure','liquidity crisis','debt ceiling','government shutdown'];
const BEAR_MOD=['decline','drop','fall','slip','slide','lose','loss','weak','miss','disappoint','warn','fear','concern','risk','threat','tariff','sanctions','inflation rise','inflation hot','inflation high','cpi hot','cpi high','fed rate','tighten','hawkish','overvalued','bubble','correction','pullback','resistance','breakdown','cut guidance','lower guidance','miss estimate','below expect','revenue miss','earnings miss','profit warn','investigate','lawsuit','antitrust','probe','subpoena','hack','breach','outage'];
// Bullish (green) — likely to push NQ up
const BULL_HEAVY=['rate cut','dovish','rally','surge','soar','breakout','all-time high','record high','ath','stimulus','qe','easing','goldilocks','soft landing','beat estimate','blowout earnings','strong guidance','raise guidance','above expect'];
const BULL_MOD=['rise','gain','climb','jump','up','advance','recover','rebound','bounce','growth','strong','beat','optimism','bullish','buy','upgrade','outperform','positive','boost','expand','accelerate','momentum','support','innovation','breakthrough','deal','partnership','acquisition','buyback','dividend','split','approval','launch'];
// NQ-specific amplifiers — if headline mentions these AND has sentiment, impact is higher
const NQ_DIRECT=['nasdaq','nq','mnq','qqq','tech','nvidia','nvda','apple','aapl','microsoft','msft','google','goog','amazon','amzn','meta','tesla','tsla','semiconductor','chip','mag seven','magnificent','faang','ai ','artificial intelligence','fed ','fomc','powell','cpi','pce','core inflation','nonfarm','non-farm','payroll','gdp','interest rate','10-year','treasury yield'];

function scoreSentiment(title,desc){
  const t=(title+' '+(desc||'')).toLowerCase();
  let score=0;
  // Heavy signals
  BEAR_HEAVY.forEach(k=>{if(t.includes(k))score-=3});
  BULL_HEAVY.forEach(k=>{if(t.includes(k))score+=3});
  // Moderate signals
  BEAR_MOD.forEach(k=>{if(t.includes(k))score-=1});
  BULL_MOD.forEach(k=>{if(t.includes(k))score+=1});
  // NQ relevance amplifier
  let nqRelevant=NQ_DIRECT.some(k=>t.includes(k));
  if(nqRelevant)score=score*1.5;
  // Classify
  const absScore=Math.abs(score);
  if(absScore>=3)return{level:'high',label:score<0?'BEARISH':'BULLISH',cls:score<0?'high':'low'};
  if(absScore>=1)return{level:'med',label:score<0?'MIXED/BEAR':'MIXED/BULL',cls:'med'};
  return{level:'low',label:'LOW IMPACT',cls:'low'};
}

  }).join('');
}

// ========== NQ COMPOSITE SIGNAL ==========
// Combines: momentum, VIX, volume, range position into one bull/bear score
let lastSignalData=null;

async function loadSignal(marketData,volData){
  try{
    // Get VIX
    let vix=null;
    try{
      const r=await proxyFetchRetry('https://query2.finance.yahoo.com/v8/finance/chart/^VIX?interval=1d&range=2d',2,6000);
      if(r){const d=await r.json();vix=d.chart.result[0].meta.regularMarketPrice;}
    }catch(e){}

    if(!marketData)return null;
    const price=marketData.price,prev=marketData.prevClose,hi=marketData.high,lo=marketData.low;
    
    // Factor 1: Momentum (price vs prev close) — weight 35%
    const momPct=((price-prev)/prev)*100;
    const momScore=Math.max(-100,Math.min(100,momPct*25)); // ±4% = ±100
    
    // Factor 2: Range position (where price sits in today's range) — weight 20%
    const range=hi-lo;
    const rangePos=range>0?((price-lo)/range)*200-100:0; // -100 to +100
    
    // Factor 3: VIX (inverted — low VIX = bullish) — weight 25%
    let vixScore=0;
    if(vix!==null){
      if(vix<15)vixScore=80;
      else if(vix<20)vixScore=40;
      else if(vix<25)vixScore=0;
      else if(vix<30)vixScore=-40;
      else vixScore=-80;
    }
    
    // Factor 4: Volume conviction — weight 20%
    let volScore=0;
    if(volData&&volData.avgVol>0){
      const volRatio=volData.totalVol/volData.avgVol;
      volScore=(momPct>=0?1:-1)*Math.min(100,Math.max(-100,(volRatio-1)*100));
    }
    
    // Weighted composite
    const composite=Math.round(momScore*0.35+rangePos*0.20+vixScore*0.25+volScore*0.20);
    const clamped=Math.max(-100,Math.min(100,composite));
    
    lastSignalData={
      score:clamped,
      factors:{
        momentum:{val:momPct,score:momScore},
        range:{val:range>0?((price-lo)/range)*100:50,score:rangePos},
        vix:{val:vix,score:vixScore},
        volume:{ratio:volData?volData.totalVol/volData.avgVol:null,score:volScore}
      }
    };
    return lastSignalData;
  }catch(e){console.warn('Signal fail:',e.message);return null}
}

function renderSignal(data){
  const el=document.getElementById('signalContent');
  if(!data){el.innerHTML='<div style="padding:20px;color:var(--text-muted);font-size:13px">Signal unavailable</div>';return}
  const s=data.score;
  let label,color;
  if(s>=60){label='STRONG BULL';color='var(--green)'}
  else if(s>=25){label='BULLISH';color='var(--green)'}
  else if(s>=-25){label='NEUTRAL';color='var(--yellow)'}
  else if(s>=-60){label='BEARISH';color='var(--red)'}
  else{label='STRONG BEAR';color='var(--red)'}
  
  const f=data.factors;
  const cls=(v)=>v>0?'up':v<0?'down':'flat';
  el.innerHTML=`
    <div class="signal-label">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12h4l3-9 4 18 3-9h4"/></svg>
      NQ SIGNAL
    </div>
    <div class="gauge-wrap">
      <svg viewBox="0 0 170 100">
        <defs><linearGradient id="gg" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#e74c3c"/><stop offset="25%" stop-color="#f39c12"/><stop offset="50%" stop-color="#f1c40f"/><stop offset="75%" stop-color="#2ecc71"/><stop offset="100%" stop-color="#27ae60"/></linearGradient></defs>
        <path d="M 15 85 A 70 70 0 0 1 155 85" fill="none" stroke="#252836" stroke-width="12" stroke-linecap="round"/>
        <path d="M 15 85 A 70 70 0 0 1 155 85" fill="none" stroke="url(#gg)" stroke-width="8" stroke-linecap="round" opacity="0.8"/>
        ${(()=>{
          // Needle: -100=left(red π), 0=top(center π/2), +100=right(green 0)
          const angle=Math.PI*(1-(s+100)/200);
          const nx=85+60*Math.cos(angle),ny=85-60*Math.sin(angle);
          return `<line x1="85" y1="85" x2="${nx}" y2="${ny}" stroke="var(--text)" stroke-width="2.5" stroke-linecap="round"/><circle cx="85" cy="85" r="4" fill="var(--text)"/>`;        })()}
        <text x="85" y="65" text-anchor="middle" fill="${color}" font-size="20" font-weight="700" font-family="var(--font-mono)">${s>0?'+':''}${s}</text>
      </svg>
    </div>
    <div class="signal-class" style="color:${color}">${label}</div>
    <div class="signal-factors">
      <div class="signal-factor"><span>Momentum</span><span class="val ${cls(f.momentum.val)}">${f.momentum.val>=0?'+':''}${f.momentum.val.toFixed(2)}%</span></div>
      <div class="signal-factor"><span>VIX</span><span class="val ${f.vix.val?cls(-f.vix.score):'flat'}">${f.vix.val?f.vix.val.toFixed(1):'N/A'}</span></div>
      <div class="signal-factor"><span>Range Pos</span><span class="val ${cls(f.range.score)}">${f.range.val.toFixed(0)}%</span></div>
      <div class="signal-factor"><span>Vol Ratio</span><span class="val ${f.volume.ratio?cls(f.volume.score):'flat'}">${f.volume.ratio?f.volume.ratio.toFixed(1)+'x':'N/A'}</span></div>
    </div>
  `;
}

// ========== INTRADAY VOLUME CHART ==========
let lastVolData=null;

async function loadVolume(){
  try{
    const r=await proxyFetchRetry('https://query2.finance.yahoo.com/v8/finance/chart/NQ=F?interval=5m&range=1d',2,6000);
    if(!r)return null;
    const d=await r.json();
    if(!d.chart||!d.chart.result)return null;
    const result=d.chart.result[0];
    const ts=result.timestamp||[];
    const vols=result.indicators.quote[0].volume||[];
    const closes=result.indicators.quote[0].close||[];
    
    const bars=[];
    let totalVol=0;
    for(let i=0;i<ts.length;i++){
      const v=vols[i]||0;
      const c=closes[i];
      const prevC=i>0?closes[i-1]:c;
      totalVol+=v;
      bars.push({time:ts[i],vol:v,close:c,up:c>=prevC});
    }
    
    // Average volume per bar (rough baseline)
    const nonZero=bars.filter(b=>b.vol>0);
    const avgVol=nonZero.length?nonZero.reduce((s,b)=>s+b.vol,0)/nonZero.length:0;
    
    lastVolData={bars,totalVol,avgVol};
    return lastVolData;
  }catch(e){console.warn('Volume fail:',e.message);return null}
}

function renderVolume(data){
  const el=document.getElementById('volContent');
  if(!data||!data.bars.length){el.innerHTML='<div style="padding:20px;color:var(--text-muted);font-size:13px">Volume data unavailable</div>';return}
  
  const bars=data.bars.filter(b=>b.vol>0);
  if(!bars.length){el.innerHTML='<div style="padding:20px;color:var(--text-muted);font-size:13px">Market not open yet</div>';return}
  const maxVol=Math.max(...bars.map(b=>b.vol));
  
  const fmtVol=(v)=>v>=1e6?(v/1e6).toFixed(1)+'M':v>=1e3?(v/1e3).toFixed(0)+'K':v;
  const fmtTime=(ts)=>new Date(ts*1000).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true});
  
  el.innerHTML=`
    <div class="vol-stat">
      <span>Total <span class="val">${fmtVol(data.totalVol)}</span></span>
      <span>Avg/Bar <span class="val">${fmtVol(Math.round(data.avgVol))}</span></span>
      <span>Peak <span class="val">${fmtVol(maxVol)}</span></span>
    </div>
    <div class="vol-chart">
      ${bars.map(b=>{
        const h=Math.max(2,Math.round((b.vol/maxVol)*120));
        const color=b.up?'var(--green)':'var(--red)';
        const opacity=b.vol>data.avgVol?'1':'0.5';
        return `<div class="vol-bar" style="height:${h}px;background:${color};opacity:${opacity}" title="${fmtTime(b.time)}: ${fmtVol(b.vol)}"></div>`;
      }).join('')}
    </div>
    <div class="vol-labels">
      <span>${fmtTime(bars[0].time)}</span>
      <span>${fmtTime(bars[bars.length-1].time)}</span>
    </div>
  `;
}

// ========== MARKET DATA ==========
// NQ/QQQ ratio — very stable because QQQ tracks Nasdaq-100 at ~1/41 the value
const NQ_QQQ_RATIO=41.32;

async function loadMarket(){
  // Try real NQ futures via proxy, then estimate from QQQ if that fails
  const nq=await loadNQFutures();
  if(nq)return nq;
  return await loadNQFromQQQ();
}

async function loadNQFutures(){
  try{
    // Try both Yahoo endpoints in parallel via proxy with retry
    const urls=[
      'https://query2.finance.yahoo.com/v8/finance/chart/NQ=F?range=1d&interval=1d',
      'https://query1.finance.yahoo.com/v8/finance/chart/NQ=F?interval=1d&range=1d',
    ];
    const attempts=urls.map(u=>proxyFetchRetry(u,2,6000).then(async r=>{
      if(!r)throw new Error('no response');
      const d=await r.json();
      if(!d.chart||!d.chart.result)throw new Error('bad data');
      return d;
    }));
    const d=await Promise.any(attempts).catch(()=>null);
    if(!d)return null;
    const meta=d.chart.result[0].meta;
    const price=meta.regularMarketPrice;
    const prev=meta.chartPreviousClose||meta.previousClose;
    if(!price||price<1000)return null; // sanity: NQ should be >1000
    return{
      symbol:'NQ / MNQ',
      tag:'LIVE FUTURES',
      price:price,
      prevClose:prev,
      change:price-prev,
      changePct:((price-prev)/prev)*100,
      high:meta.regularMarketDayHigh||price,
      low:meta.regularMarketDayLow||price,
      open:meta.regularMarketOpen||price,
    };
  }catch(e){console.warn('NQ futures fail:',e.message);return null}
}

// Compute approximate NQ price from QQQ ETF (reliable direct CORS API)
async function loadNQFromQQQ(){
  try{
    const r=await fetch('https://api.twelvedata.com/quote?symbol=QQQ&apikey=demo',{signal:AbortSignal.timeout(5000)});
    if(!r.ok)return null;
    const d=await r.json();
    if(d.code||!d.close)return null;
    const qqqPrice=parseFloat(d.close),qqqPrev=parseFloat(d.previous_close);
    // Convert QQQ to NQ using stable ratio
    const price=Math.round(qqqPrice*NQ_QQQ_RATIO*100)/100;
    const prev=Math.round(qqqPrev*NQ_QQQ_RATIO*100)/100;
    return{
      symbol:'NQ / MNQ',
      tag:'EST. VIA QQQ',
      price:price,
      prevClose:prev,
      change:price-prev,
      changePct:((price-prev)/prev)*100,
      high:Math.round(parseFloat(d.high)*NQ_QQQ_RATIO*100)/100||price,
      low:Math.round(parseFloat(d.low)*NQ_QQQ_RATIO*100)/100||price,
      open:Math.round(parseFloat(d.open)*NQ_QQQ_RATIO*100)/100||price,
    };
  }catch(e){console.warn('QQQ fallback fail:',e.message);return null}
}

function renderMarket(data){
  const el=document.getElementById('marketContent');
  if(!data){el.innerHTML='<div class="market-unavailable">Market data unavailable — tap REFRESH to retry</div>';return}
  const up=data.change>=0;

  const tagStyle=isLive?'background:rgba(46,204,113,0.15);color:var(--green)':'background:rgba(243,156,18,0.15);color:var(--orange)';
  el.innerHTML=`
    <div class="market-symbol">${data.symbol} <span class="tag" style="${tagStyle}">${data.tag||'LIVE FUTURES'}</span></div>
    <div class="market-price">$${data.price.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}</div>
    <div class="market-change ${up?'up':'down'}">

    </div>
  `;
}

// ========== ECONOMIC CALENDAR ==========
function buildCalendar(){
  const today=new Date();
  const events=[];
  const weekly=[
    {event:'Initial Jobless Claims',day:4,time:'5:30 AM PT',impact:'high'},
    {event:'Continuing Jobless Claims',day:4,time:'5:30 AM PT',impact:'medium'},
  ];
  const major=[
    {event:'FOMC Rate Decision',time:'11:00 AM PT',impact:'high'},
    {event:'CPI (Consumer Price Index)',time:'5:30 AM PT',impact:'high'},
    {event:'PPI (Producer Price Index)',time:'5:30 AM PT',impact:'high'},
    {event:'Non-Farm Payrolls',time:'5:30 AM PT',impact:'high'},
    {event:'PCE Price Index',time:'5:30 AM PT',impact:'high'},
    {event:'GDP (Preliminary)',time:'5:30 AM PT',impact:'high'},
    {event:'ISM Manufacturing PMI',time:'7:00 AM PT',impact:'high'},
    {event:'ISM Services PMI',time:'7:00 AM PT',impact:'medium'},
    {event:'Retail Sales',time:'5:30 AM PT',impact:'high'},
    {event:'Consumer Confidence',time:'7:00 AM PT',impact:'medium'},
    {event:'Durable Goods Orders',time:'5:30 AM PT',impact:'medium'},
    {event:'Existing Home Sales',time:'7:00 AM PT',impact:'medium'},
    {event:'New Home Sales',time:'7:00 AM PT',impact:'medium'},
    {event:'Housing Starts',time:'5:30 AM PT',impact:'medium'},
  ];
  for(let i=0;i<7;i++){
    const d=new Date(today);d.setDate(d.getDate()+i);
    if(d.getDay()===0||d.getDay()===6)continue;
    const label=d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
    weekly.forEach(w=>{if(d.getDay()===w.day)events.push({event:w.event,time:label+' · '+w.time,impact:w.impact})});
    const idx=(d.getDate()+d.getMonth())%major.length;
    if(events.length<12)events.push({event:major[idx].event,time:label+' · '+major[idx].time,impact:major[idx].impact});
  }
  return events.slice(0,12);
}

function renderCalendar(events){
  const el=document.getElementById('calList');
  if(!events.length){el.innerHTML='<div class="news-empty">No upcoming events</div>';return}
  el.innerHTML=events.map(e=>`
    <div class="cal-item">
      <div class="cal-event">${e.event}</div>
      <div class="cal-time">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
        ${e.time}
        <span class="cal-impact ${e.impact}">${e.impact.toUpperCase()}</span>
      </div>
    </div>
  `).join('');
}

// ========== LOAD ALL — RENDER AS EACH ARRIVES ==========
let isLoading=false;
async function loadAll(){
  if(isLoading)return;
  isLoading=true;
  const btn=document.getElementById('refreshBtn');
  btn.classList.add('loading');
  btn.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg> LOADING...';

  renderCalendar(buildCalendar());

  let done=0;
  const total=4; // news, market+signal, volume, (signal computed after market+vol)
  function tick(){
    done++;
    if(done>=total){
      btn.classList.remove('loading');
      btn.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg> REFRESH';
      document.getElementById('lastUpdated').textContent=new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true});
      isLoading=false;
    }
  }

  // News — independent
  loadNews().then(v=>renderNews(v||[])).catch(()=>renderNews([])).finally(tick);

  // Volume — independent, render immediately
  const volPromise=loadVolume().then(v=>{renderVolume(v);return v}).catch(()=>{renderVolume(null);return null});
  volPromise.finally(tick);

  // Market + Signal — market first, then signal uses market+vol data
  const mktPromise=loadMarket().then(v=>{renderMarket(v);return v}).catch(()=>{renderMarket(null);return null});
  mktPromise.finally(tick);

  // Signal depends on market + volume
  Promise.all([mktPromise,volPromise]).then(([mkt,vol])=>{
    return loadSignal(mkt,vol).then(s=>renderSignal(s)).catch(()=>renderSignal(null));
  }).finally(tick);
}

// Auto-load on open
loadAll();
